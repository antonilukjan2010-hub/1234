<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Twój Sklep - X.pl</title>
    <link rel="stylesheet" href="37.css">
</head>
<body>

    <main class="container">

        <section class="page-section">
            <h2>Strona Główna</h2>
            <div class="placeholder-box">Tutaj banner lub nowości</div>
        </section>

        <section class="page-section">
            <h2>Lista produktów</h2>
            <div class="product-list">
                <div class="product-item">
                    <div class="thumb"></div>
                    <div class="details-line"></div>
                </div>
                <div class="product-item"><div class="thumb"></div><div class="details-line"></div></div>
                <div class="product-item"><div class="thumb"></div><div class="details-line"></div></div>
            </div>
        </section>

        <section class="page-section">
            <h2>Product Details Page (PDP)</h2>
            <div class="pdp-container">
                <div class="pdp-top">
                    <div class="pdp-main-img"></div>
                    <div class="pdp-info">Cena / Przycisk</div>
                </div>
                <div class="pdp-description">OPIS</div>
            </div>
        </section>

    </main>

</body>
</html>
